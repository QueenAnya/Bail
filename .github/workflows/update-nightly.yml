name: Update Nightly

permissions:
  contents: write

on:
  push:
    branches:
      - master

jobs:
  update-nightly:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Fetching tags
        run: git fetch --tags -f || true

      - name: Setup Node
        uses: actions/setup-node@v3.6.0
        with:
          node-version: 20.x

      - name: Enable Corepack and Set Yarn Version
        run: |
          corepack cache clean
          corepack enable
          corepack prepare yarn@4.x --activate

      - name: Restore Yarn Cache
        uses: actions/cache@v3
        id: yarn-cache
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: |
          yarn cache clean
          rm yarn.lock .yarn/cache -rf
          yarn install
          yarn install --mode=update-lockfile
          yarn install --no-immutable

      - name: Update version to alpha
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          BASE=${CURRENT%%-*}
          NEW="$BASE-alpha.$(date +%Y%m%d%H%M)"
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='$NEW';fs.writeFileSync('package.json', JSON.stringify(p, null, 2)+'\n')"
          echo "Set version to $NEW"

      - name: Build NPM package
        run: yarn pack && mv *baileys-*.tgz baileys-nightly.tgz

      - name: Generate Changelog
        id: generate_changelog
        run: |
          changelog=$(yarn run --silent changelog:preview)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "${changelog}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update Nightly TAG
        uses: richardsimko/update-tag@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: nightly

      - name: Update Nightly Release
        uses: meeDamian/github-release@2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: nightly
          commitish: ${{ github.sha }}
          name: Nightly Release
          body: ${{ steps.generate_changelog.outputs.changelog }}
          draft: false
          prerelease: true
          files: >
            baileys-nightly.tgz
          gzip: folders
          allow_override: true
