name: E2E Tests

# NOTE: The upstream WhiskeySockets e2e suite needs a private mock WhatsApp
# server (ghcr.io/whiskeysockets-devtools/bartender) gated behind a private
# org secret (BARTENDER_GHCR_TOKEN). Forks/renamed copies of this repo have
# neither, and referencing a missing secret in `services.*.credentials.password`
# is an invalid workflow template (fails to even parse, regardless of trigger
# type) — that's the "Unexpected value ''" error. So this workflow no longer
# references that private image/secret at all; it just reports that e2e is
# skipped on forks. If you stand up your own mock server, replace the
# "Run E2E tests" step below with your own service+test step and wire in
# your own credentials.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Setup Node.js and Corepack
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Enable Corepack and Set Yarn Version
        run: |
          corepack enable
          corepack prepare yarn@4.x --activate

      - name: Restore Yarn Cache
        uses: actions/cache@v4
        with:
          path: .yarn/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies
        run: yarn install --immutable

      - name: E2E tests skipped (no private mock server on this fork)
        run: |
          echo "Skipping e2e tests: this fork has no access to WhiskeySockets' private mock server / secret."
          echo "See the comment at the top of .github/workflows/e2e.yml to wire in your own mock server."
