name: Publish Release PNPM

on:
  push:
    tags:
      - 'av*'

permissions: write-all

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetching tags
        run: git fetch --tags -f || true

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Get previous version
        id: get_previous_version
        run: |
          git checkout HEAD~1 package.json || true
          PREV_VERSION=$(node -p "require('./package.json').version")
          git checkout HEAD package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "prev_version=$PREV_VERSION" >> $GITHUB_OUTPUT
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          if [ "$(printf '%s\n' "$PREV_VERSION" "$CURRENT_VERSION" | sort -V | head -n1)" != "$CURRENT_VERSION" ] && [ "$PREV_VERSION" != "$CURRENT_VERSION" ]; then
            echo "version_increased=true" >> $GITHUB_OUTPUT
          else
            echo "version_increased=false" >> $GITHUB_OUTPUT
          fi

          # Check if version is beta
          if [[ "$CURRENT_VERSION" == *-beta* ]]; then
            echo "is_beta=true" >> $GITHUB_OUTPUT
          else
            echo "is_beta=false" >> $GITHUB_OUTPUT
          fi

      - name: Log version changes
        run: |
          echo "Previous version: ${{ steps.get_previous_version.outputs.prev_version }}"
          echo "Current version: ${{ steps.get_previous_version.outputs.current_version }}"
          echo "Version increased: ${{ steps.get_previous_version.outputs.version_increased }}"
          echo "Is beta version: ${{ steps.get_previous_version.outputs.is_beta }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: 'https://registry.npmjs.org'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install Dependencies
        run: |
          pnpm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish in NPM (as `@queenanya/baileys` in regular)
        # if: steps.get_previous_version.outputs.version_increased == 'true' && steps.get_previous_version.outputs.is_beta == 'false'
        if: steps.get_previous_version.outputs.is_beta == 'false'
        run: |
          pnpm publish --access public --no-git-checks
          pnpm deprecate @queenanya/baileys@"< ${{ github.ref_name }}" "This version is outdated, please upgrade to the latest version."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Publish in NPM (teamolduser scope in regular)
        # if: steps.get_previous_version.outputs.version_increased == 'true' && steps.get_previous_version.outputs.is_beta == 'false'
        if: steps.get_previous_version.outputs.is_beta == 'false'
        run: |
          npx json -I -f package.json -e "this.name='@teamolduser/baileys'"
          pnpm publish --access public --no-git-checks --//registry.npmjs.org/:_authToken=$NPM_TOKEN
          pnpm deprecate @teamolduser/baileys@"< ${{ github.ref_name }}" "This version is outdated, please upgrade to the latest version."
          npx json -I -f package.json -e "this.name='@queenanya/baileys'"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Publish in NPM (as `@queenanya/baileys` in beta)
        # if: steps.get_previous_version.outputs.version_increased == 'true' && steps.get_previous_version.outputs.is_beta == 'true'
        if: steps.get_previous_version.outputs.is_beta == 'true'
        run: |
          pnpm publish --access public --tag beta --no-git-checks
          pnpm deprecate @queenanya/baileys@"< ${{ github.ref_name }}" "This version is outdated, please upgrade to the latest version."
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Publish in NPM (teamolduser scope in beta)
        # if: steps.get_previous_version.outputs.version_increased == 'true' && steps.get_previous_version.outputs.is_beta == 'true'
        if: steps.get_previous_version.outputs.is_beta == 'true'
        run: |
          npx json -I -f package.json -e "this.name='@teamolduser/baileys'"
          pnpm publish --access public --tag beta --no-git-checks --//registry.npmjs.org/:_authToken=$NPM_TOKEN
          pnpm deprecate @teamolduser/baileys@"< ${{ github.ref_name }}" "This version is outdated, please upgrade to the latest version."
          npx json -I -f package.json -e "this.name='@queenanya/baileys'"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Generate Changelog
        id: generate_changelog
        run: |
          changelog=$(npm run changelog:last --silent)
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "${changelog}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Make Package
        run: npm pack

      - name: Rename Pack
        run: mv *.tgz baileys.tgz

      - name: Create Release
        uses: meeDamian/github-release@2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref }}
          commitish: ${{ github.sha }}
          name: ${{ github.ref_name }}
          body: ${{ steps.generate_changelog.outputs.changelog }}
          draft: false
          prerelease: false
          files: baileys.tgz
          gzip: folders
          allow_override: true
